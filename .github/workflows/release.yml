# Release: run full check on version tags so releases are protected by the same checks.
# Trigger: push of a tag matching v* (e.g. v0.1.0). Does not publish; use CI secrets for PyPI if needed.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  main:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: obr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/obr_test
      REVIEW_STORE: postgres
      CHECKPOINTER: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (full) + Postgres deps
        run: |
          make install-dev-full
          pip install "langgraph-checkpoint-postgres[postgres]" "psycopg[binary]>=3"
          pip install "mypy>=1.8" "ruff>=0.4"
      - name: Full check
        run: make check-full
      - name: Gateway-orchestrator boundary and contract parity
        run: |
          pytest tests/unit/test_gateway_orchestrator_boundary.py tests/contract/test_surface_parity.py tests/contract/test_openapi_contract_paths.py tests/contract/test_openapi_schema_snapshots.py -v
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: OpenAPI and SDK TS codegen drift gate
        run: make verify-openapi-sdk-contract
      - name: Postgres review store and checkpointer tests
        run: |
          pytest tests/unit/test_review_store_postgres.py tests/integration/test_checkpointer_postgres.py -v
