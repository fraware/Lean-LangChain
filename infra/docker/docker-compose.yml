# Obligation Runtime — Gateway + Postgres for local/production-style runs
# From repo root: docker compose -f infra/docker/docker-compose.yml up -d
# Requires: build context = repo root (docker compose -f infra/docker/docker-compose.yml build)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: obr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/gateway.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/obr
      REVIEW_STORE: postgres
      CHECKPOINTER: postgres
      OBR_CORS_ORIGINS: "http://localhost:3000"
      # OBR_ENV: production  # uncomment to enforce Postgres at startup
    depends_on:
      postgres:
        condition: service_healthy
    # Optional: uncomment for production resource limits
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: "1"

volumes:
  postgres_data: {}
