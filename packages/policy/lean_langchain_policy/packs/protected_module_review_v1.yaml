version: "0.1.0"
name: "protected_module_review_v1"
description: "Protected modules always require human sign-off"
allow_trust_compiler: false
block_sorry_ax: true
block_unexpected_custom_axioms: true
require_human_if_imports_change: true
protected_paths:
  - "Foo/Safety.lean"
  - "Foo/Policy.lean"
require_human_on_trust_delta: true
allow_interactive_warnings: true
single_owner_handoff: false
reviewer_gated_execution: false
lock_ownership_invariant: false
evidence_complete_execution_token: false
delegation_admissibility: false
state_transition_preservation: false
artifact_admissibility: false
side_effect_authorization: false
